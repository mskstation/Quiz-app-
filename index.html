<!DOCTYPE html>
<html>
<head>
  <title>Quiz App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="box">
  <h2>Quiz App 🚀</h2>

  <select id="cat">
    <option value="math">Math</option>
    <option value="english">English</option>
    <option value="reasoning">Reasoning</option>
  </select>

  <select id="diff">
    <option value="easy">Easy</option>
    <option value="hard">Hard</option>
  </select>

  <p id="timer">Time: 30</p>

  <h3 id="q"></h3>

  <button onclick="check(0)" id="b0"></button>
  <button onclick="check(1)" id="b1"></button>
  <button onclick="check(2)" id="b2"></button>
  <button onclick="check(3)" id="b3"></button>

  <p id="score">Score: 0</p>
</div>

<audio id="right" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>
<audio id="wrong" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

<script src="script.js"></script>
</body>
</html>
